<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>SmartKaz</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600;700&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<header>
			<a href="#" class="logo">SmartKaz</a>
			<nav class="navbar">
				<a href="#">Mac</a>
				<a href="#">iPad</a>
				<a href="#">iPhone</a>
				<a href="#">Watch</a>
				<a href="#">AirPods</a>
				<a href="#">Audio</a>
				<a href="#">Brands</a>
				<a href="#">Services</a>
				<a href="#">More</a>
			</nav>
			<button class="hamburger">
				<div class="bar__humb"></div>
			</button>
		</header>
		<nav class="mobile__navbar">
			<a href="#">Mac</a>
			<a href="#">iPad</a>
			<a href="#">iPhone</a>
			<a href="#">Watch</a>
			<a href="#">AirPods</a>
			<a href="#">Audio</a>
			<a href="#">Brands</a>
			<a href="#">Services</a>
			<a href="#">More</a>
		</nav>
		<div class="slider middle">
			<div class="slides">
				<input type="radio" name="r" id="r1" checked />
				<input type="radio" name="r" id="r2" />
				<input type="radio" name="r" id="r3" />
				<input type="radio" name="r" id="r4" />
				<div class="slide s1">
					<img src="/Mainimg/anglephone.png" alt="anglephone" />
				</div>
				<div class="slide">
					<img src="/Mainimg/doublephone.jpg" alt="doublephone" />
				</div>
				<div class="slide">
					<img src="/Mainimg/oneiphone.jpg" alt="oneiphone" />
				</div>
				<div class="slide">
					<img src="/Mainimg/triplephone.jpg" alt="triplephone" />
				</div>
			</div>
			<div class="navigation">
				<label for="r1" class="bar"></label>
				<label for="r2" class="bar"></label>
				<label for="r3" class="bar"></label>
				<label for="r4" class="bar"></label>
			</div>
		</div>
		<p class="besti__title">Best Products of the Year</p>
		<section class="bestitems__cont">
			<div class="item__one"></div>
			<div class="item__two"></div>
			<div class="item__three"></div>
		</section>
		<script src="main.js"></script>
	</body>
	<link rel="stylesheet" href="main.css" />
</html>
