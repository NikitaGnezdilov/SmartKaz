<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>SmartKaz</title>
	</head>
	<body>
		<header>
			<nav>
				<h1>SmartKaz</h1>
				<div class="cont__nav">
					<ul class="nav__buttons">
						<li><a href="#" id="nav__button">Info</a></li>
						<li><a href="#" id="nav__button">Products</a></li>
						<li><a href="#" id="nav__button">Support</a></li>
					</ul>
				</div>
				<div class="main__humb">
					<div class="cont__burger">
						<div class="burger">
							<span></span>
						</div>
					</div>
				</div>
			</nav>
		</header>
		<script>
			document.querySelector('.burger').addEventListener('click', function () {
				this.classList.toggle('active')
				document.querySelector('.cont__nav').classList.toggle('active')
			})
		</script>
	</body>
	<link rel="stylesheet" href="main.css" />
</html>
